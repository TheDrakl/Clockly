name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  backend:
    name: Backend - Django
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: denys
          POSTGRES_PASSWORD: 12343211234
          POSTGRES_DB: clockly
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:  # Make sure Django sees these
      SECRET_KEY: dummysecretkey123
      DEBUG: 'False'
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: clockly
      DB_USER: denys
      DB_PASSWORD: 12343211234
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django migrations and tests
      run: |
        cd backend
        python manage.py migrate
        python manage.py test

  frontend:
    name: Frontend - Vue
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build frontend
      run: |
        cd frontend
        npm run build