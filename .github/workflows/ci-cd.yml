name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  backend:
    name: Backend - Django
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: denys
          POSTGRES_PASSWORD: 12343211234
          POSTGRES_DB: clockly
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: dummysecretkey123
      DEBUG: 'False'
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: clockly
      DB_USER: denys
      DB_PASSWORD: 12343211234
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: backend.test_settings  # Moved here to ensure it's available for all commands

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest pytest-django

    - name: Run Django migrations
      run: |
        cd backend
        python manage.py migrate

    - name: Run tests
      run: |
        cd backend
        pytest tests/test_user_auth.py -v  # Changed from test/ to tests/

    - name: Verify test discovery
      run: |
        cd backend
        echo "Test files found:"
        find . -name "test_*.py"
        python -m pytest --collect-only

  frontend:
    name: Frontend - Vue
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build frontend
      run: |
        cd frontend
        npm run build